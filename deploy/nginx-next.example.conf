# Ejemplo: Nginx delante de Next (pm2 en 127.0.0.1:3016).
# Error típico: HTML carga pero /_next/static/chunks/*.js → 404
# = el proxy NO envía /_next/* al proceso Node, o usás try_files estilo SPA.
#
# Copiá/adaptá dentro de server { ... } y reemplazá server_name y el puerto.

upstream next_ima {
    server 127.0.0.1:3016;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name sistema-ima.sistemataup.online;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    # Todo el tráfico del dominio va a Next (incluye /_next/static, /_next/image, RSC, etc.)
    location / {
        proxy_pass http://next_ima;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# Redirigir HTTP → HTTPS (evita chrome-error y contenido mixto)
server {
    listen 80;
    server_name sistema-ima.sistemataup.online;
    return 301 https://$host$request_uri;
}
